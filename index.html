<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Interactive Journal</title>
    <link rel="stylesheet" href="style.css">

    <!-- Libraries -->
    <!-- p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <!-- p5.js SceneManager -->
    <script src="https://cdn.jsdelivr.net/gh/mveteanu/p5.SceneManager@latest/lib/scenemanager.min.js"></script>
    <!-- StPageFlip -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <!-- PDF.js for PDF rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- User Settings -->
    <script src="settings.js"></script>

    <!-- Application Modules -->
    <script src="lib/audioManager.js"></script>
    <script src="lib/pdfLoader.js"></script>
    <script src="lib/dataLoader.js"></script>
    <script src="lib/bookEngine.js"></script>
    <script src="lib/zoomManager.js"></script>
    <script src="lib/sceneManager.js"></script>

    <!-- Background Sketches -->
    <script src="sketches/default.js"></script>
</head>

<body>

    <!-- p5.js container (background) -->
    <div id="p5-container"></div>

    <!-- The Book Container -->
    <div class="book-wrapper">
        <div id="book">
            <!-- Pages will be injected here by script.js -->

            <!-- Hardcoded Cover for initial structure -->
            <div class="page cover" data-density="hard">
                <div class="page-content">
                    <h1>The Lost Journal</h1>
                    <p class="author">by A. Traveler</p>
                    <p class="instruction">(Click corner or drag to open)</p>
                </div>
            </div>

            <!-- Blank Page (Inside Cover) -->
            <div class="page">
                <div class="page-content"></div>
            </div>

            <!-- Hardcoded Table of Contents Page -->
            <div class="page">
                <div class="page-content">
                    <h2>Table of Contents</h2>
                    <ul id="toc-list">
                        <!-- TOC items injected here -->
                    </ul>
                </div>
            </div>

            <!-- Blank Page for spacing (TOC on left, Blank on right) -->
            <div class="page">
                <div class="page-content"></div>
            </div>

        </div>
    </div>
    </div>

    <!-- UI Controls (Desktop) -->
    <div id="ui-controls">
        <button id="btn-toc" title="Go to Table of Contents">
            Table of Contents
        </button>
        <button id="btn-zoom-reset" title="Reset Zoom">↺</button>
    </div>

    <!-- Mobile Navigation Controls -->
    <div id="mobile-nav-controls">
        <button id="btn-prev-page" class="nav-btn" aria-label="Previous Page">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <path d="M15 18l-6-6 6-6" />
            </svg>
        </button>

        <button id="btn-toc-mobile" class="nav-btn" aria-label="Table of Contents">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
        </button>

        <button id="btn-next-page" class="nav-btn" aria-label="Next Page">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <path d="M9 18l6-6-6-6" />
            </svg>
        </button>
    </div>

    <!-- Application Modules (add responsiveManager) -->
    <script src="lib/responsiveManager.js"></script>
    <script src="script.js"></script>
</body>

</html>
